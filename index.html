<!DOCTYPE html>
<html lang="en">
<head>
<!-- ═══════════════════════════════════════════════════════
     WANZA SMART REVIEW — INDEX.HTML
     Version: 6.0 | Cloudflare Pages | REST API via fetch()
     ═══════════════════════════════════════════════════════ -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="description" content="Wanza Smart Review & Profile System">
<meta name="theme-color" content="#070b14">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Smart Review System</title>
<link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#070b14; --surface:#0d1526; --card:#111827; --border:rgba(255,255,255,0.07);
  --border-hov:rgba(108,99,255,0.35); --accent:#6c63ff; --accent2:#f72585;
  --accent3:#43e97b; --gold:#ffd700; --text:#e8eaf6; --muted:#7986a3;
  --glass:rgba(255,255,255,0.04); --glow:0 0 32px rgba(108,99,255,0.2);
  --shadow-sm:0 2px 12px rgba(0,0,0,0.4); --shadow-md:0 6px 28px rgba(0,0,0,0.5);
  --radius-sm:10px; --radius-md:14px; --radius-lg:20px; --radius-pill:50px;
  --max-w:600px;
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px;
  --sp-6:24px; --sp-7:28px; --sp-8:32px; --sp-10:40px;
  --fs-xs:clamp(0.7rem,2vw,0.78rem); --fs-sm:clamp(0.8rem,2.5vw,0.88rem);
  --fs-md:clamp(0.875rem,3vw,0.95rem); --fs-lg:clamp(1rem,3.5vw,1.1rem);
  --fs-xl:clamp(1.3rem,5vw,1.75rem); --fs-2xl:clamp(1.6rem,6vw,2.1rem);
  --touch:44px; --ease:cubic-bezier(.4,0,.2,1);
  --t-fast:0.18s var(--ease); --t-base:0.28s var(--ease);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-text-size-adjust:100%;}
html{scroll-behavior:smooth;}
body{
  font-family:'DM Sans',system-ui,sans-serif; font-size:var(--fs-md);
  line-height:1.6; background:var(--bg); color:var(--text);
  min-height:100vh; min-height:100dvh; overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
}
body::before{
  content:''; position:fixed; inset:0; z-index:0;
  background:radial-gradient(ellipse 70% 45% at 15% 8%,rgba(108,99,255,.12),transparent 65%),
             radial-gradient(ellipse 55% 38% at 85% 85%,rgba(247,37,133,.08),transparent 65%);
  pointer-events:none;
}

/* LOADING */
#loading-screen{
  position:fixed;inset:0;z-index:9999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:var(--sp-5);
  transition:opacity .45s var(--ease);
}
#loading-screen.hidden{opacity:0;pointer-events:none;}
.loader-wrap{position:relative;width:52px;height:52px;}
.loader-ring{position:absolute;inset:0;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;}
.loader-dot{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:1.4rem;animation:pulse 1.6s ease-in-out infinite;}
.loader-text{font-family:'Outfit',sans-serif;font-size:var(--fs-xs);color:var(--muted);letter-spacing:2.5px;text-transform:uppercase;animation:pulse 1.6s ease-in-out infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulse{0%,100%{opacity:.35}50%{opacity:1}}

/* PAGE */
.page-wrapper{position:relative;z-index:1;width:100%;max-width:var(--max-w);margin:0 auto;padding-bottom:clamp(80px,15vw,120px);}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .5s var(--ease) both;}
.s1{animation-delay:.05s}.s2{animation-delay:.10s}.s3{animation-delay:.15s}
.s4{animation-delay:.20s}.s5{animation-delay:.25s}.s6{animation-delay:.30s}

/* HERO */
.hero{position:relative;padding:clamp(36px,8vw,56px) var(--sp-4) var(--sp-7);text-align:center;overflow:hidden;}
.hero::after{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:min(220px,60%);height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.6;}
.business-logo{width:clamp(72px,18vw,96px);height:clamp(72px,18vw,96px);border-radius:clamp(16px,4vw,22px);object-fit:cover;border:1.5px solid var(--border);box-shadow:var(--glow);margin:0 auto var(--sp-4);display:block;}
.business-name{font-family:'Outfit',sans-serif;font-size:var(--fs-2xl);font-weight:800;line-height:1.15;background:linear-gradient(130deg,#fff 0%,var(--accent) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;word-break:break-word;padding:0 var(--sp-2);}
.business-type{font-size:var(--fs-xs);font-weight:500;color:var(--accent);text-transform:uppercase;letter-spacing:2.5px;margin-top:var(--sp-2);}
.business-address{font-size:var(--fs-sm);color:var(--muted);margin-top:var(--sp-2);line-height:1.5;padding:0 var(--sp-2);}
.business-description{font-size:var(--fs-sm);color:var(--muted);margin:var(--sp-3) auto 0;max-width:min(380px,100%);line-height:1.65;padding:0 var(--sp-2);}

/* CONTACT */
.contact-section{padding:var(--sp-5) var(--sp-4);}
.contact-row{display:flex;gap:var(--sp-2);flex-wrap:wrap;}
.contact-btn{flex:1 1 100px;min-width:90px;display:inline-flex;align-items:center;justify-content:center;gap:6px;min-height:var(--touch);padding:0 var(--sp-3);border-radius:var(--radius-pill);text-decoration:none;font-family:'DM Sans',sans-serif;font-size:var(--fs-sm);font-weight:600;border:none;cursor:pointer;transition:transform var(--t-fast);white-space:nowrap;-webkit-user-select:none;user-select:none;}
.contact-btn:active{transform:scale(.95);}
.btn-call{background:linear-gradient(135deg,#11998e,#38ef7d);color:#fff;}
.btn-wa{background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;}
.btn-email{background:linear-gradient(135deg,#f7971e,#fd5e1f);color:#fff;}

/* SECTION CARD */
.section{padding:0 var(--sp-4) var(--sp-5);}
.section-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;width:100%;}
.section-header{padding:var(--sp-4) var(--sp-5);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:var(--sp-2);}
.section-icon{font-size:1.15rem;}
.section-title{font-family:'Outfit',sans-serif;font-size:var(--fs-md);font-weight:700;color:var(--text);}

/* SOCIAL GRID */
.social-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,230px),1fr));gap:var(--sp-3);padding:var(--sp-4);}
.social-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--sp-3) var(--sp-4);text-decoration:none;display:flex;align-items:center;gap:var(--sp-3);transition:transform var(--t-fast),border-color var(--t-base);cursor:pointer;min-height:var(--touch);overflow:hidden;-webkit-user-select:none;user-select:none;}
.social-card:active{transform:scale(.96);}
@media(hover:hover){.social-card:hover{transform:translateY(-2px);border-color:var(--border-hov);}}
.social-icon-wrap{width:40px;height:40px;border-radius:var(--radius-sm);overflow:hidden;background:var(--glass);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.social-icon-wrap img{width:100%;height:100%;object-fit:cover;border-radius:var(--radius-sm);}
.social-icon-emoji{font-size:1.25rem;line-height:1;}
.social-info{flex:1;overflow:hidden;min-width:0;}
.social-name{font-size:var(--fs-sm);font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.social-followers{font-size:var(--fs-xs);color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.social-arrow{color:var(--muted);font-size:.9rem;flex-shrink:0;}

/* RATING */
.review-section{padding:0 var(--sp-4) var(--sp-5);}
.rating-prompt{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:clamp(20px,5vw,32px) var(--sp-4);text-align:center;}
.rating-prompt h3{font-family:'Outfit',sans-serif;font-size:var(--fs-lg);font-weight:700;margin-bottom:6px;}
.rating-prompt p{font-size:var(--fs-sm);color:var(--muted);margin-bottom:var(--sp-5);line-height:1.5;}
.stars-row{display:flex;justify-content:center;gap:clamp(4px,2vw,10px);margin-bottom:4px;}
.star-btn{font-size:clamp(1.8rem,8vw,2.4rem);background:none;border:none;cursor:pointer;transition:transform .15s var(--ease);filter:grayscale(1) opacity(.4);line-height:1;min-width:var(--touch);min-height:var(--touch);display:inline-flex;align-items:center;justify-content:center;padding:2px;-webkit-user-select:none;user-select:none;}
.star-btn.active{filter:none;}
@media(hover:hover){.star-btn:hover{transform:scale(1.2);filter:none;}}

#feedback-form{display:none;}
.feedback-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:clamp(20px,5vw,32px) var(--sp-4);text-align:center;margin-top:var(--sp-3);}
.feedback-card h3{font-family:'Outfit',sans-serif;font-size:var(--fs-lg);margin-bottom:6px;}
.feedback-card p{font-size:var(--fs-sm);color:var(--muted);margin-bottom:var(--sp-4);line-height:1.5;}
textarea.feedback-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text);padding:var(--sp-3);font-family:'DM Sans',sans-serif;font-size:var(--fs-md);resize:vertical;min-height:100px;outline:none;transition:border-color var(--t-fast);-webkit-appearance:none;}
textarea.feedback-input:focus{border-color:var(--accent);}
.btn-primary{width:100%;margin-top:var(--sp-3);padding:0 var(--sp-4);height:52px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:var(--radius-pill);font-family:'Outfit',sans-serif;font-size:var(--fs-md);font-weight:700;cursor:pointer;transition:transform var(--t-fast);letter-spacing:.4px;-webkit-user-select:none;user-select:none;}
.btn-primary:active{transform:scale(.97);}

#review-suggestions{display:none;margin-top:var(--sp-3);}
.reviews-container{display:flex;flex-direction:column;gap:var(--sp-3);}
.review-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:var(--sp-4);position:relative;overflow:hidden;}
.review-card::before{content:'"';position:absolute;top:-8px;left:10px;font-size:4.5rem;color:var(--accent);opacity:.1;font-family:Georgia,serif;pointer-events:none;line-height:1;}
.review-text{font-size:var(--fs-sm);line-height:1.65;color:var(--text);margin-bottom:var(--sp-3);}
.copy-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:0 var(--sp-4);height:50px;background:linear-gradient(135deg,var(--accent),#a855f7);color:#fff;border:none;border-radius:var(--radius-pill);font-family:'Outfit',sans-serif;font-size:var(--fs-sm);font-weight:600;cursor:pointer;transition:transform var(--t-fast);-webkit-user-select:none;user-select:none;}
.copy-btn.copied{background:linear-gradient(135deg,var(--accent3),#06b6d4);}
.copy-btn:active{transform:scale(.96);}
.hint-text{text-align:center;font-size:var(--fs-xs);color:var(--muted);margin-top:var(--sp-3);line-height:1.45;}

/* SHARE FAB */
.share-fab{position:fixed;bottom:max(20px,env(safe-area-inset-bottom,20px));right:max(20px,env(safe-area-inset-right,20px));width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),#ff6b6b);color:#fff;font-size:1.25rem;border:none;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 6px 24px rgba(247,37,133,.4);transition:transform var(--t-fast);z-index:100;-webkit-user-select:none;user-select:none;}
.share-fab:active{transform:scale(.9);}

/* TOAST */
.toast{position:fixed;bottom:max(88px,calc(env(safe-area-inset-bottom,0px) + 88px));left:50%;transform:translateX(-50%) translateY(16px);background:var(--card);border:1px solid var(--border);border-radius:var(--radius-pill);padding:10px 20px;font-size:var(--fs-sm);font-weight:500;opacity:0;transition:opacity .3s var(--ease),transform .3s var(--ease);pointer-events:none;z-index:9999;white-space:normal;max-width:min(340px,calc(100vw - 32px));text-align:center;line-height:1.4;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.toast.success{border-color:var(--accent3);color:var(--accent3);}
.toast.error{border-color:var(--accent2);color:var(--accent2);}

/* FOOTER */
/* FOOTER */
.footer{
  text-align:center;
  padding:var(--sp-5) var(--sp-4) var(--sp-4);
  border-top:1px solid var(--border);
  margin-top:var(--sp-2);
}
.footer-logo{
  width:clamp(48px,12vw,64px);
  margin-bottom:var(--sp-2);
  display:block;
  margin-left:auto;
  margin-right:auto;
}
.footer-name{
  font-family:'Outfit',sans-serif;
  font-size:var(--fs-md);
  font-weight:700;
  color:var(--text);
  line-height:1.3;
}
.footer-tagline{
  font-size:var(--fs-xs);
  color:var(--muted);
  margin-top:2px;
  line-height:1.4;
}
.footer-links{
  display:flex;
  justify-content:center;
  gap:var(--sp-3);
  margin-top:var(--sp-3);
  flex-wrap:wrap;
}
.footer-link{
  font-size:var(--fs-xs);
  color:var(--accent);
  text-decoration:none;
  min-height:36px;
  display:inline-flex;
  align-items:center;
  gap:4px;
}
/* ERROR */
.empty-state{text-align:center;padding:var(--sp-7) var(--sp-4);color:var(--muted);font-size:var(--fs-sm);}
.error-page{min-height:70vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:var(--sp-10) var(--sp-4);}
.error-emoji{font-size:3rem;margin-bottom:var(--sp-4);}
.error-title{font-family:'Outfit',sans-serif;font-size:var(--fs-xl);font-weight:700;margin-bottom:8px;}
.error-text{color:var(--muted);font-size:var(--fs-sm);line-height:1.55;}

/* RESPONSIVE */
@media(max-width:360px){
  :root{--sp-4:13px;--sp-5:17px;}
  .contact-btn{flex:1 1 100%;}
  .social-grid{grid-template-columns:1fr;}
  .star-btn{font-size:1.75rem;min-width:38px;}
}
@media(max-width:480px){
  .social-grid{grid-template-columns:1fr 1fr;}
  .contact-btn{flex:1 1 calc(50% - 4px);}
}
@media(min-width:769px){
  :root{--sp-4:20px;--sp-5:24px;--sp-7:32px;}
  .hero{padding:clamp(48px,6vw,60px) var(--sp-5) var(--sp-8);}
  .section,.review-section,.contact-section{padding-left:var(--sp-5);padding-right:var(--sp-5);}
  .social-grid{grid-template-columns:repeat(2,1fr);}
}
@media(min-width:1024px){:root{--max-w:640px;}}
</style>
</head>
<body>

<div id="loading-screen" role="status" aria-label="Loading profile">
  <div class="loader-wrap">
    <div class="loader-ring"></div>
    <div class="loader-dot">⚡</div>
  </div>
  <div class="loader-text">Loading Profile…</div>
</div>

<div class="page-wrapper" id="page-content" style="display:none;" aria-live="polite"></div>
<div class="toast" id="toast" role="alert" aria-atomic="true"></div>
<button class="share-fab" id="share-btn" aria-label="Share profile">🔗</button>

<script>
// ════════════════════════════════════════════════════════════
//  WANZA INDEX — Cloudflare Pages Edition
//  Uses fetch() REST API instead of google.script.run
// ════════════════════════════════════════════════════════════

// ── CONFIG ────────────────────────────────────────────────────
// IMPORTANT: Replace this URL with your actual Apps Script Web App URL
var GAS_URL = 'https://script.google.com/macros/s/AKfycbwm9ef2q-ztEuewaft6khLrYnZoS-UzzYj2CgnNvVzIXI94hv9dD7mQGwfXSJC99H75/exec';

// Get client_id from URL parameters
var CLIENT_ID = new URLSearchParams(window.location.search).get('client_id') || '';

// ── APP STATE ─────────────────────────────────────────────────
var CLIENT     = null;
var SETTINGS   = {};
var SOCIAL     = [];
var SEL_RATING = 0;
var REVIEWS    = [];

// ── API HELPER ────────────────────────────────────────────────
function apiGet(action, extraParams) {
  var url = GAS_URL + '?action=' + encodeURIComponent(action);
  if (extraParams) {
    Object.keys(extraParams).forEach(function(k) {
      url += '&' + encodeURIComponent(k) + '=' + encodeURIComponent(extraParams[k]);
    });
  }
  return fetch(url).then(function(r) { return r.json(); });
}

function apiPost(action, data) {
  return fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(Object.assign({ action: action }, data))
  }).then(function(r) { return r.json(); });
}

// ── ANTI-SPAM THROTTLE ────────────────────────────────────────
var _lastAction = {};
function throttle(key, ms) {
  ms = ms || 2000;
  var now = Date.now();
  if (_lastAction[key] && now - _lastAction[key] < ms) return false;
  _lastAction[key] = now;
  return true;
}

// ── TOAST ─────────────────────────────────────────────────────
var _toastTimer;
function showToast(msg, type, duration) {
  type = type || 'success'; duration = duration || 2800;
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(function() { t.className = 'toast'; }, duration);
}

// ── PLATFORM HELPERS ──────────────────────────────────────────
function getSocialLabel(platformName, customLabel) {
  if (customLabel && customLabel.trim()) return customLabel.trim();
  var map = { youtube:'Subscribers', website:'Visitors', blog:'Readers', twitch:'Followers', podcast:'Listeners' };
  return map[(platformName||'').toLowerCase().replace(/\s+/g,'')] || 'Followers';
}
function fmtCount(n) {
  n = parseInt(n) || 0;
  if (!n) return null;
  if (n >= 1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'') + 'M+';
  if (n >= 1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'') + 'K+';
  return n + '+';
}
function getPlatformEmoji(name) {
  var map = { facebook:'📘', instagram:'📸', twitter:'🐦', x:'🐦', youtube:'▶️', tiktok:'🎵',
    linkedin:'💼', pinterest:'📌', snapchat:'👻', telegram:'✈️', whatsapp:'💬',
    threads:'🧵', website:'🌐', blog:'📝', twitch:'🎮', podcast:'🎙️' };
  return map[(name||'').toLowerCase()] || '🔗';
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── RENDER PAGE ───────────────────────────────────────────────
function renderPage(client, settings, social) {
  var contactHTML = '';
  if (client.phone || client.whatsapp_number || client.email) {
    contactHTML = '<div class="contact-section fade-up s4"><div class="contact-row">'
      + (client.phone ? '<a class="contact-btn btn-call" href="tel:' + esc(client.phone) + '"><span>📞</span>Call</a>' : '')
      + (client.whatsapp_number ? '<a class="contact-btn btn-wa" href="https://wa.me/' + client.whatsapp_number.replace(/\D/g,'') + '" target="_blank" rel="noopener"><span>💬</span>WhatsApp</a>' : '')
      + (client.email ? '<a class="contact-btn btn-email" href="mailto:' + esc(client.email) + '"><span>✉️</span>Email</a>' : '')
      + '</div></div>';
  }
  var socialHTML = '';
  if (social && social.length) {
    var cards = social.map(function(s) {
      var iconEl = s.platform_icon_url
        ? '<div class="social-icon-wrap"><img src="' + esc(s.platform_icon_url) + '" alt="' + esc(s.platform_name) + '" loading="lazy" onerror="this.parentNode.innerHTML=\'<span class=social-icon-emoji>🔗</span>\'"></div>'
        : '<div class="social-icon-wrap"><span class="social-icon-emoji">' + getPlatformEmoji(s.platform_name) + '</span></div>';
      var label = getSocialLabel(s.platform_name, s.social_label || s.socialLabel);
      var countStr = fmtCount(s.followers_count);
      var subtext = countStr ? countStr + ' ' + label : 'Visit profile';
      return '<div class="social-card" role="link" tabindex="0" onclick="socialClick(\'' + esc(s.id) + '\',\'' + esc(s.platform_name) + '\',\'' + esc(s.profile_url) + '\')">'
        + iconEl
        + '<div class="social-info"><div class="social-name">' + esc(s.platform_name) + '</div>'
        + '<div class="social-followers">' + esc(subtext) + '</div></div>'
        + '<span class="social-arrow" aria-hidden="true">›</span></div>';
    }).join('');
    socialHTML = '<div class="section fade-up s5"><div class="section-card">'
      + '<div class="section-header"><span class="section-icon">🌐</span><span class="section-title">Find Us Online</span></div>'
      + '<div class="social-grid">' + cards + '</div>'
      + '</div></div>';
  }

  var g = getGreeting();
document.getElementById('page-content').innerHTML =
    '<div class="greeting-bar fade-up s1">' + g.emoji + ' <span>' + g.text + '</span></div>'
    + '<div class="hero">'

<style>

}

<style>
    '<div class="hero">'
    + (client.logo_url ? '<img class="business-logo fade-up s1" src="' + esc(client.logo_url) + '" alt="' + esc(client.name) + '" loading="lazy" onerror="this.style.display=\'none\'">' : '')
    + '<div class="business-name fade-up s2">' + esc(client.name) + '</div>'
    + (client.business_type ? '<div class="business-type fade-up s2">' + esc(client.business_type) + '</div>' : '')
    + (client.address ? '<div class="business-address fade-up s3">📍 ' + esc(client.address) + '</div>' : '')
    + (client.description ? '<div class="business-description fade-up s3">' + esc(client.description) + '</div>' : '')
    + '</div>'
    + contactHTML + socialHTML
    + '<div class="review-section fade-up s6">'
    + '<div class="rating-prompt" id="rating-prompt">'
    + '<h3>⭐ Rate Your Experience</h3><p>How was your visit? Tap a star to rate us!</p>'
    + '<div class="stars-row" id="stars-row" role="group" aria-label="Star rating">'
    + [1,2,3,4,5].map(function(r) {
        return '<button class="star-btn" data-r="' + r + '" onclick="selectRating(' + r + ')" aria-label="' + r + ' star' + (r>1?'s':'') + '">⭐</button>';
      }).join('')
    + '</div></div>'
    + '<div id="feedback-form"><div class="feedback-card">'
    + '<h3>😔 We\'re Sorry to Hear That</h3>'
    + '<p>Please share what we can improve. Your feedback helps us get better!</p>'
    + '<textarea class="feedback-input" id="feedback-text" rows="4" placeholder="Tell us what went wrong…" aria-label="Feedback text"></textarea>'
    + '<button class="btn-primary" onclick="submitFeedback()">Send Feedback</button>'
    + '</div></div>'
    + '<div id="review-suggestions">'
    + '<div class="reviews-container" id="reviews-container"></div>'
    + '<p class="hint-text">Tap "Copy &amp; Review" → paste it on Google!</p>'
    + '</div></div>'
    + '<footer class="footer">'
    + (settings.logo_url ? '<img class="footer-logo" src="' + esc(settings.logo_url) + '" alt="' + esc(settings.company_name||'Wanza') + '" loading="lazy" onerror="this.style.display=\'none\'">' : '')
    + '<div class="footer-name">' + esc(settings.company_name || 'Wanza Marketing') + '</div>'
    + '<div class="footer-tagline">' + esc(settings.tagline || 'Grow Your Business with Smart System') + '</div>'
    + '<nav class="footer-links">'
    + (settings.phone ? '<a class="footer-link" href="tel:' + esc(settings.phone) + '">📞 ' + esc(settings.phone) + '</a>' : '')
    + (settings.email ? '<a class="footer-link" href="mailto:' + esc(settings.email) + '">✉️ ' + esc(settings.email) + '</a>' : '')
    + '</nav></footer>';

  var fab = document.getElementById('share-btn');
  fab.style.display = 'flex';
  fab.onclick = handleShare;
}

// ── RATING ────────────────────────────────────────────────────
function selectRating(r) {
  if (!throttle('rating', 500)) return;
  SEL_RATING = r;
  document.querySelectorAll('.star-btn').forEach(function(s, i) {
    s.classList.toggle('active', i < r);
  });
  setTimeout(function() {
    var fbForm = document.getElementById('feedback-form');
    var revSug = document.getElementById('review-suggestions');
    if (r <= 3) {
      fbForm.style.display = 'block';
      revSug.style.display = 'none';
      fbForm.scrollIntoView({ behavior:'smooth', block:'nearest' });
    } else {
      fbForm.style.display = 'none';
      loadReviewSuggestions();
    }
  }, 200);
}

// ── REVIEW SUGGESTIONS ────────────────────────────────────────
function loadReviewSuggestions() {
  var container = document.getElementById('reviews-container');
  container.innerHTML = '<div class="empty-state">⏳ Loading review suggestions…</div>';
  document.getElementById('review-suggestions').style.display = 'block';
  document.getElementById('review-suggestions').scrollIntoView({ behavior:'smooth', block:'nearest' });

  apiGet('getRandomReview', { client_id: CLIENT_ID })
    .then(function(res) {
      REVIEWS = res.success ? res.data : [];
      if (!REVIEWS.length) {
        container.innerHTML = '<div class="empty-state">No review templates available yet.</div>';
        return;
      }
      container.innerHTML = REVIEWS.map(function(rv, i) {
        return '<div class="review-card" id="rc-' + i + '">'
          + '<div class="review-text">' + esc(rv.review_text) + '</div>'
          + '<button class="copy-btn" id="cb-' + i + '" onclick="copyReview(' + i + ',\'' + esc(rv.review_id) + '\')">'
          + '📋 Copy &amp; Review</button></div>';
      }).join('');
    })
    .catch(function() {
      container.innerHTML = '<div class="empty-state">Failed to load reviews. Please try again.</div>';
    });
}

// ── COPY REVIEW ───────────────────────────────────────────────
function copyReview(idx, reviewId) {
  if (!throttle('copy_' + idx, 3000)) { showToast('Please wait a moment…', ''); return; }
  var text = REVIEWS[idx] && REVIEWS[idx].review_text;
  if (!text) return;
  var doAfterCopy = function() {
    var btn = document.getElementById('cb-' + idx);
    if (btn) { btn.innerHTML = '✅ Copied!'; btn.classList.add('copied'); }
    showToast('Review copied! Redirecting to Google…', 'success');
    apiPost('markReviewUsed', { review_id: reviewId });
    logAction('copy_review', reviewId);
    logAction('review_redirect', CLIENT.google_review_link || '');
    setTimeout(function() {
      if (CLIENT.google_review_link) window.open(CLIENT.google_review_link, '_blank');
    }, 1500);
  };
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(doAfterCopy).catch(function() { fbCopyText(text, doAfterCopy); });
  } else {
    fbCopyText(text, doAfterCopy);
  }
}

function fbCopyText(text, callback) {
  try {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px;opacity:0;';
    document.body.appendChild(ta); ta.focus(); ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    if (callback) callback();
  } catch(e) {
    showToast('Could not copy automatically. Please copy manually.', 'error');
  }
}

// ── SUBMIT FEEDBACK ───────────────────────────────────────────
function submitFeedback() {
  if (!throttle('feedback', 5000)) { showToast('Please wait before submitting again.', ''); return; }
  var text = document.getElementById('feedback-text').value.trim();
  if (!text) { showToast('Please write your feedback first.', 'error'); return; }
  apiPost('saveFeedback', { feedback: {
    client_id: CLIENT_ID, rating: SEL_RATING, feedback_text: text,
    device: navigator.userAgent, location: ''
  }}).then(function() {
    document.getElementById('feedback-form').innerHTML =
      '<div class="feedback-card"><div style="font-size:2.5rem;margin-bottom:10px;">🙏</div>'
      + '<h3>Thank You!</h3><p>Your feedback has been recorded. We\'ll work to improve!</p></div>';
    showToast('Feedback submitted. Thank you!', 'success');
  }).catch(function() { showToast('Failed to submit. Please try again.', 'error'); });
}

// ── SOCIAL CLICK ──────────────────────────────────────────────
function socialClick(linkId, platform, url) {
  if (!throttle('social_' + linkId, 1000)) return;
  logAction('social_click', platform);
  if (url) window.open(url, '_blank', 'noopener,noreferrer');
}

// ── SHARE ─────────────────────────────────────────────────────
function getShareUrl() {
  return window.location.origin + window.location.pathname + '?client_id=' + encodeURIComponent(CLIENT_ID);
}
function handleShare() {
  if (!throttle('share', 2000)) return;
  var shareUrl = getShareUrl();
  var bizName  = (CLIENT && CLIENT.name) ? CLIENT.name : 'Business Profile';
  var biz      = (CLIENT && CLIENT.name) ? CLIENT.name : 'this business';
  var message  = 'Check ' + biz + '\'s business profile 👇\n' + shareUrl;
  if (navigator.share) {
    navigator.share({ title: bizName, text: message, url: shareUrl })
      .then(function() { logAction('share_click','native'); })
      .catch(function(err) { if (err.name !== 'AbortError') fallbackShare(message, shareUrl); });
  } else {
    fallbackShare(message, shareUrl);
  }
}
function fallbackShare(message, shareUrl) {
  window.open('https://wa.me/?text=' + encodeURIComponent(message), '_blank', 'noopener,noreferrer');
  logAction('share_click','whatsapp');
  if (navigator.clipboard) {
    navigator.clipboard.writeText(shareUrl).then(function() {
      showToast('🔗 Link copied + WhatsApp opened!', 'success');
    });
  } else {
    showToast('💬 WhatsApp opened!', 'success');
  }
}

// ── LOG ACTION ────────────────────────────────────────────────
function logAction(type, value) {
  apiPost('logAnalytics', { analytics: {
    client_id: CLIENT_ID, action_type: type, action_value: value || '',
    device: navigator.userAgent, location: ''
  }}).catch(function() {});
}

// ── GREETING ──────────────────────────────────────────────────
function getGreeting() {
  var h = new Date().getHours();
  if (h >= 5 && h < 12)  return { emoji: '🌤️', text: 'Good Morning' };
  if (h >= 12 && h < 17) return { emoji: '☀️', text: 'Good Afternoon' };
  return { emoji: '🌙', text: 'Good Evening' };
}

// ── INIT ──────────────────────────────────────────────────────
function init() {
  var loading = document.getElementById('loading-screen');
  var content = document.getElementById('page-content');

  if (!GAS_URL || GAS_URL === 'YOUR_APPS_SCRIPT_WEB_APP_URL_HERE') {
    loading.classList.add('hidden');
    content.style.display = 'block';
    content.innerHTML = '<div class="error-page"><div class="error-emoji">⚙️</div>'
      + '<div class="error-title">Setup Required</div>'
      + '<div class="error-text">Please update GAS_URL in index.html with your Apps Script Web App URL.</div></div>';
    return;
  }

  if (!CLIENT_ID) {
    loading.classList.add('hidden');
    content.style.display = 'block';
    content.innerHTML = '<div class="error-page"><div class="error-emoji">🔍</div>'
      + '<div class="error-title">Client Not Found</div>'
      + '<div class="error-text">No client ID provided. Please scan a valid QR code.</div></div>';
    return;
  }

  // Load client, settings, and social links in parallel
  Promise.all([
    apiGet('getClient', { client_id: CLIENT_ID }),
    apiGet('getSettings'),
    apiGet('getSocialLinks', { client_id: CLIENT_ID })
  ]).then(function(results) {
    var clientRes   = results[0];
    var settingsRes = results[1];
    var socialRes   = results[2];

    if (!clientRes.success || !clientRes.data) {
      loading.classList.add('hidden');
      content.style.display = 'block';
      content.innerHTML = '<div class="error-page"><div class="error-emoji">😕</div>'
        + '<div class="error-title">Profile Not Found</div>'
        + '<div class="error-text">This business profile doesn\'t exist or may have been removed.</div></div>';
      return;
    }

    CLIENT   = clientRes.data;
    SETTINGS = settingsRes.success ? settingsRes.data : {};
    SOCIAL   = socialRes.success   ? socialRes.data   : [];

    renderPage(CLIENT, SETTINGS, SOCIAL);
    loading.classList.add('hidden');
    content.style.display = 'block';
    logAction('visit', getShareUrl());
  }).catch(function(err) {
    console.error('Init failed:', err);
    loading.classList.add('hidden');
    content.style.display = 'block';
    content.innerHTML = '<div class="error-page"><div class="error-emoji">❌</div>'
      + '<div class="error-title">Connection Error</div>'
      + '<div class="error-text">Could not connect to server. Please check your internet connection and try again.</div></div>';
  });
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', function() { setTimeout(init, 80); });
} else {
  setTimeout(init, 80);
}
</script>
